<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Offline — Stellar Tipz</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif; background: #f7f7f7; }
      .wrap { max-width: 720px; margin: 0 auto; padding: 48px 20px; }
      .card { background: #fff; border: 4px solid #000; box-shadow: 8px 8px 0 rgba(0,0,0,1); padding: 24px; }
      h1 { margin: 0 0 8px; font-size: 32px; font-weight: 900; text-transform: uppercase; }
      p { margin: 0; font-weight: 700; color: #333; line-height: 1.6; }
      .hint { margin-top: 16px; font-size: 14px; color: #555; font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>You’re offline</h1>
        <p>Stellar Tipz can’t reach the network right now. You can still browse previously cached pages.</p>
        <div class="hint">Tip: reconnect to refresh live stats and rankings.</div>
      </div>
    </div>
  </body>
</html>
